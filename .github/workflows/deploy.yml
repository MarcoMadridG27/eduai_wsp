name: Deploy WhatsApp Bot to EC2

on:
  push:
    branches: [ "main", "master" ]

env:
  IMAGE_NAME: eduai-wsp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Crear el directorio de despliegue si no existe
            mkdir -p ~/eduai-backend
            cd ~/eduai-backend

            # 1. Escribir el archivo .env de producción a partir del secreto de GitHub
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF

            # Asegurar que DOCKERHUB_USERNAME esté configurado en el .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            # 2. Recrear el archivo docker-compose.yml unificado en la EC2
            cat << 'EOF' > docker-compose.yml
            version: '3.8'

            services:
              auth-api:
                image: ${DOCKERHUB_USERNAME}/eduai-auth:latest
                container_name: eduai-auth
                ports:
                  - "8000:9990"
                environment:
                  - JWT_SECRET=${JWT_SECRET}
                  - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
                  - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
                  - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
                  - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
                  - DATABASE_URL=${DATABASE_URL}
                  - CORS_ORIGINS=${CORS_ORIGINS:-*}
                restart: always

              core-api:
                image: ${DOCKERHUB_USERNAME}/eduai-core:latest
                container_name: eduai-core
                ports:
                  - "7700:7700"
                environment:
                  - GOOGLE_API_KEY=${GOOGLE_API_KEY}
                  - DB_NAME=/app/data/lesson_memory.db
                  - TXT_URL=${TXT_URL:-https://raw.githubusercontent.com/angelmc-12/myfirstrepo/master/curriculo_texto.txt}
                volumes:
                  - core_data:/app/data
                restart: always

              pdf-api:
                image: ${DOCKERHUB_USERNAME}/pdf-render:latest
                container_name: pdf-render
                ports:
                  - "9000:8800"
                restart: always

              wsp-bot:
                image: ${DOCKERHUB_USERNAME}/eduai-wsp:latest
                container_name: eduai-wsp
                environment:
                  - CORE_API_URL=http://core-api:7700
                  - PDF_API_URL=http://pdf-api:8800
                volumes:
                  - wsp_session:/app/.wsp_session
                restart: always

            volumes:
              core_data:
              wsp_session:
            EOF

            # 3. Descargar la nueva imagen del bot
            docker compose pull wsp-bot

            # 4. Levantar/actualizar solo el bot
            docker compose up -d wsp-bot

            # 5. Limpiar imágenes antiguas sin usar para liberar espacio
            docker image prune -f
